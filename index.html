<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: gold;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .info {
            padding: 15px;
        }
        .title {
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .weight {
            font-size: 16px;
            margin: 8px 0;
            color: gold;
        }
        .call {
            display: block;
            text-align: center;
            padding: 12px;
            background: gold;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
